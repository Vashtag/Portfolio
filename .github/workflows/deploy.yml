name: Deploy to GitHub Pages

on:
  # Deploy whenever the production branch is updated.
  push:
    branches: ['main']
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# contents:write is needed to publish the built site to the branch root as a
# fallback (see the "Publish branch-root fallback" step).
permissions:
  contents: write
  pages: write
  id-token: write

# Queue deployments instead of cancelling in-flight ones. GitHub Pages rejects
# a new deployment while an older one is still in progress, and cancelling a
# run mid-deploy orphans that deployment in the "in progress" state — which
# then blocks the next run with "Deployment request failed … due to in
# progress deployment". Letting runs queue avoids the race entirely.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Publish the built site to the branch root too. GitHub Pages serves this
      # repo from the branch root, so the root must contain a real index.html
      # (otherwise Pages renders README.md). Self-cleaning: stale hashed assets
      # are removed so only the current build is committed.
      - name: Publish branch-root fallback
        run: |
          rm -rf assets favicon.svg index.html
          cp -R dist/. .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html favicon.svg assets
          if git diff --cached --quiet; then
            echo "Branch-root build output is already current."
          else
            git commit -m "Publish built site [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
