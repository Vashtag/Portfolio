name: Deploy to GitHub Pages

on:
  # Deploy whenever the production branch is updated.
  push:
    branches: ['main']
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions needed for GitHub Pages deployment and the branch-root fallback.
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel in-progress runs.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish branch-root fallback
        run: |
          cp -R dist/. .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html favicon.svg assets
          if git diff --cached --quiet; then
            echo "Branch-root build output is already current."
          else
            git commit -m "Publish built site [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
